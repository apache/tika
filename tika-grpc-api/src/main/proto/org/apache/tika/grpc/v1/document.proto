// The Document shape: a single, small, stable contract for a parsed Tika document,
// instead of a proto message per source format.
//
// Metadata: typed common fields (the Dublin Core descriptive core) plus a TAGGED tail
// that is lossless. Tags come from Tika's declared Property value type; unknown keys
// are strings, never guessed.
//
// Format specifics arrive via per-parser DocumentTransformer code, not a proto-per-type,
// so adding a parser never touches the wire. Planned additive follow-ups (structured
// content tree, embedded-document recursion) extend this file with new fields; proto3
// field additions are wire-compatible, so none of them break existing clients.

syntax = "proto3";

package org.apache.tika.grpc.v1;

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "org.apache.tika.grpc.v1";

message Document {
  // envelope
  string id = 1;
  string content_type = 2;             // Tika-detected MIME type
  google.protobuf.Timestamp parsed_at = 4;
  ParseStatus status = 5;
  SourceOrigin origin = 6;

  // metadata
  DocumentMetadata metadata = 20;      // typed common fields
  repeated MetadataField extra = 21;   // tagged tail: everything not already typed

  // Field numbers 3, 10-19, and 30+ are intentionally unassigned: planned additive
  // features (structured content blocks, embedded-document recursion) claim them
  // without renumbering anything that has shipped.
}

message SourceOrigin {
  string filename = 1;
  int64 byte_size = 2;
  string parser = 3;
  // Hex-encoded SHA-256 of the source bytes, taken from the digest the parse pipeline
  // recorded (the X-TIKA:digest:SHA256 metadata value). Empty when the pipeline has no
  // digester configured. Downstream consumers use it to tie derived artifacts
  // (annotations, index entries) back to the exact bytes that were parsed.
  string sha256 = 4;
}

// =========================================================================
// Metadata: typed common fields. The descriptive core follows the Dublin Core
// element set (title, creator, description, subject, language, publisher,
// identifier, date, rights), which is also the vocabulary Tika's own property
// model and XMP anchor to. Anything narrower -- page counts, dimensions,
// format-specific keys -- travels in `extra` with its declared type preserved,
// so it never forces a wire-contract change.
// =========================================================================
message DocumentMetadata {
  string title = 1;
  repeated string authors = 2;
  string description = 3;
  repeated string keywords = 4;
  repeated string languages = 5;
  repeated string publishers = 6;
  // Unambiguous references to the resource as declared by the document itself
  // (DOI, ISBN, ...), from dc:identifier.
  repeated string identifiers = 7;

  google.protobuf.Timestamp created = 10;
  google.protobuf.Timestamp modified = 11;

  string rights = 20;         // free-text rights/license statement, from dc:rights
}

// =========================================================================
// Tagged tail: typed where Tika declares the type, string otherwise (never guessed).
//
// A Tika metadata entry is an ARRAY of values under one key (tika-core's Metadata is
// String[]-backed; a single value is a one-element array, and declared sequences such
// as pdf:charsPerPage or tiff:BitsPerSample carry one element per page/sample). The
// oneof therefore tags the ELEMENT type of the whole array -- integers stay int64,
// dates stay Timestamps, even when there are many of them. Scalar consumers read
// values[0]; nothing is ever collapsed or stringified to make that convenient.
// =========================================================================
message MetadataField { string key = 1; MetadataValue value = 2; }
message MetadataValue {
  oneof values {
    StringValues strings = 1;           // default for untyped text; never guessed
    IntegerValues integers = 2;
    NumberValues numbers = 3;
    BooleanValues booleans = 4;
    TimestampValues timestamps = 5;
  }
}
message StringValues { repeated string values = 1; }
message IntegerValues { repeated int64 values = 1; }
message NumberValues { repeated double values = 1; }
message BooleanValues { repeated bool values = 1; }
message TimestampValues { repeated google.protobuf.Timestamp values = 1; }

message ParseStatus {
  enum Status { UNSPECIFIED = 0; SUCCESS = 1; PARTIAL = 2; FAILED = 3; }
  Status status = 1;
  // Wall-clock milliseconds for the whole fetch+parse round trip as observed by the
  // server. Fetch and parse happen together inside the forked pipes worker, so a
  // parse-only time is not separable here -- the name says what is actually measured.
  int64 fetch_parse_time_ms = 2;
  repeated string parsers_used = 3;
  repeated string errors = 4;
  // Version string of the Tika that produced this document (e.g. "Apache Tika 4.0.0"),
  // so long-lived stores can tell which producer wrote an entry.
  string tika_version = 5;
  // The raw pipes result name this document's status was derived from (e.g.
  // "PARSE_SUCCESS", "TIMEOUT"; see org.apache.tika.pipes.api.PipesResult.RESULT_STATUS).
  // Diagnostic detail behind the typed `status`, not a stable enumeration: branch on
  // `status`, log this.
  string pipes_status = 6;
}
