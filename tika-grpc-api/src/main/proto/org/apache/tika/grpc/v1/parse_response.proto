syntax = "proto3";

package org.apache.tika.grpc.v1;

import "org/apache/tika/grpc/v1/climate_forecast_metadata.proto";
import "org/apache/tika/grpc/v1/creative_commons_metadata.proto";
import "org/apache/tika/grpc/v1/database_metadata.proto";
import "org/apache/tika/grpc/v1/dublin_core.proto";
import "org/apache/tika/grpc/v1/email_metadata.proto";
import "org/apache/tika/grpc/v1/epub_metadata.proto";
import "org/apache/tika/grpc/v1/generic_metadata.proto";
import "org/apache/tika/grpc/v1/html_metadata.proto";
import "org/apache/tika/grpc/v1/image_metadata.proto";
import "org/apache/tika/grpc/v1/media_metadata.proto";
import "org/apache/tika/grpc/v1/office_metadata.proto";
import "org/apache/tika/grpc/v1/pdf_metadata.proto";
import "org/apache/tika/grpc/v1/rtf_metadata.proto";
import "org/apache/tika/grpc/v1/font_metadata.proto";
import "org/apache/tika/grpc/v1/warc_metadata.proto";
import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_outer_classname = "ParseResponseProto";
option java_package = "org.apache.tika.grpc.v1";

// Flexible ParseResponse that mirrors how Tika actually stores metadata.
// Only populated fields are included, making it much more efficient.
message ParseResponse {
  // Document identifier
  string doc_id = 1;
  string parse_id = 2;

  // Core content (always present if extraction succeeded)
  ParseContent content = 3;

  // Dublin Core metadata - standardized fields present in most documents
  DublinCoreMetadata dublin_core = 4;

  // Tika-detected MIME type for the primary document (Metadata.CONTENT_TYPE).
  // Canonical location; do not rely on per-format content_type duplicates.
  optional string content_type = 6;

  // Coarse document category used to route document_metadata (mirrors DocumentTypeDetector).
  optional DocumentFormatCategory primary_format = 27;

  // Document-type-specific metadata. These are NOT mutually exclusive: a single
  // document can populate more than one (e.g. a PDF carrying embedded image/EXIF
  // metadata, or an Office file with XMP). This mirrors Tika's data model, whose
  // metadata routinely spans namespaces. `primary_format` names the detected
  // primary type; today the mapper populates that one, but the contract permits
  // any combination. Field numbers are preserved from the former `oneof` so the
  // change is wire-compatible.
  optional OfficeMetadata office = 5;
  optional PdfMetadata pdf = 7;
  optional ImageMetadata image = 8;
  optional EmailMetadata email = 9;
  optional MediaMetadata media = 10;
  optional HtmlMetadata html = 11;
  optional RtfMetadata rtf = 17;
  optional DatabaseMetadata database = 18;
  optional FontMetadata font = 19;
  optional EpubMetadata epub = 20;
  optional WarcMetadata warc = 21;
  optional ClimateForcastMetadata climate_forecast = 22;
  optional GenericMetadata generic = 24;

  // Creative Commons / XMP rights metadata — coexists with the format-specific
  // metadata above when XMP rights are present.
  optional CreativeCommonsMetadata creative_commons = 25;

  // Complete Tika metadata mirror: one entry per key (multivalue via text_list).
  // Authoritative lossless channel alongside typed document_metadata fields.
  repeated MetadataEntry metadata = 12;

  // Parse status and statistics
  ParseStatus status = 13;

  reserved 14;
  reserved "raw_properties";

  // Embedded documents if found
  repeated EmbeddedDocument embedded_docs = 15;

  google.protobuf.Timestamp parsed_at = 16;
}

// Coarse format category for routing and clients. Values mirror
// org.apache.tika.grpc.mapper.builders.DocumentTypeDetector.DocumentType.
// New categories receive new numbers; do not renumber existing values.
enum DocumentFormatCategory {
  DOCUMENT_FORMAT_CATEGORY_UNSPECIFIED = 0;
  DOCUMENT_FORMAT_CATEGORY_PDF = 1;
  DOCUMENT_FORMAT_CATEGORY_OFFICE = 2;
  DOCUMENT_FORMAT_CATEGORY_IMAGE = 3;
  DOCUMENT_FORMAT_CATEGORY_EMAIL = 4;
  DOCUMENT_FORMAT_CATEGORY_MEDIA = 5;
  DOCUMENT_FORMAT_CATEGORY_HTML = 6;
  DOCUMENT_FORMAT_CATEGORY_RTF = 7;
  DOCUMENT_FORMAT_CATEGORY_DATABASE = 8;
  DOCUMENT_FORMAT_CATEGORY_FONT = 9;
  DOCUMENT_FORMAT_CATEGORY_EPUB = 10;
  DOCUMENT_FORMAT_CATEGORY_WARC = 11;
  DOCUMENT_FORMAT_CATEGORY_CLIMATE_FORECAST = 12;
  DOCUMENT_FORMAT_CATEGORY_CREATIVE_COMMONS = 13;
  DOCUMENT_FORMAT_CATEGORY_GENERIC = 14;
}

// Core content - the actual text extracted
message ParseContent {
  string body = 1;
  optional string title = 2;
  optional string description = 3;
  optional string keywords = 4;
  int64 content_length = 5;
}

// Generic metadata entry for properties not covered by the strongly-typed fields.
// Values are coerced using Tika Property definitions when available (integer, number,
// boolean, date); otherwise sensible parsing is attempted before falling back to text.
message MetadataEntry {
  string key = 1;
  oneof value {
    string text = 2;
    int64 integer = 3;
    double number = 4;
    bool boolean = 5;
    google.protobuf.Timestamp date = 6;
    StringList text_list = 7;
  }
}

// String list helper
message StringList {
  repeated string values = 1;
}

// Parse status
message ParseStatus {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_SUCCESS = 1;
    STATUS_PARTIAL = 2;
    STATUS_FAILED = 3;
    STATUS_TIMEOUT = 4;
  }

  Status status = 1;
  int64 parse_time_ms = 2;
  string parser_used = 3;
  repeated string parsers_used = 4;
  repeated string warnings = 5;
  repeated string errors = 6;
}

// Embedded document
message EmbeddedDocument {
  string id = 1;
  string path = 2;
  string filename = 3;
  string content_type = 4;
  int32 embed_depth = 5;

  // The embedded doc can have its own parsed content
  optional ParseResponse parsed_content = 6;
}
